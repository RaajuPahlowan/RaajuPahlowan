name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: RaajuPahlowan
          template: classic
          base: header, activity
          base_indepth: yes
          config_timezone: Asia/Dhaka
          config_padding: 10, 15
          extras_css: |
            :root { --color-background: #050e1f; --color-text: #00e5ff; }
            h2.section { color: #00e5ff; }
            .field[data-name="repositories"] { display: none }
            .field[data-name="following"] { display: none }
            .field[data-name="watching"] { display: none }
            .field[data-name="organizations"] { display: none }
            .field[data-name="sponsoring"] { display: none }
            .field[data-name="sponsors"] { display: none }
            .field[data-name="forkers"] { display: none }
            .field[data-name="packages"] { display: none }
            .field[data-name="releases"] { display: none }
            .field[data-name="disk_usage"] { display: none }
            .field[data-name="license"] { display: none }
            .field[data-name="contributed"] { display: none }
          filename: github-metrics.svg

      - name: Generate calendar heatmap
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          user: RaajuPahlowan
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Dhaka
          extras_css: |
            :root { --color-background: #050e1f; }
          filename: github-calendar.svg
