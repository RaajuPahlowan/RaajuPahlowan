name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: jstrieb/github-stats@master
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
