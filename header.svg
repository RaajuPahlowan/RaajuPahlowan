<svg width="860" height="210" viewBox="0 0 860 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Wave gradients: deep navy → electric blue → neon cyan -->
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#0a1f3d"/>
      <stop offset="45%"  style="stop-color:#1a6fbd"/>
      <stop offset="100%" style="stop-color:#00e5ff"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#071428"/>
      <stop offset="50%"  style="stop-color:#0d4a8a"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <linearGradient id="waveGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#040d1a"/>
      <stop offset="60%"  style="stop-color:#082f5e"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>

    <!-- Neon cyan glow for text -->
    <filter id="cyanGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#00e5ff" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for dots -->
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="clip">
      <rect width="860" height="210" rx="14"/>
    </clipPath>
  </defs>

  <style>
    .w3 { animation: w3 9s ease-in-out infinite alternate; }
    .w2 { animation: w2 7s ease-in-out infinite alternate; }
    .w1 { animation: w1 5s ease-in-out infinite alternate; }

    @keyframes w3 {
      0%   { d: path("M0,125 C130,85  270,155 440,110 C600,70  730,145 860,105 L860,0 L0,0 Z"); }
      50%  { d: path("M0,105 C165,145 310,60  460,120 C610,175 755,80  860,125 L860,0 L0,0 Z"); }
      100% { d: path("M0,135 C145,95  315,165 475,105 C625,55  765,135 860,95  L860,0 L0,0 Z"); }
    }
    @keyframes w2 {
      0%   { d: path("M0,95  C145,55  295,135 455,85  C615,35  745,115 860,75  L860,0 L0,0 Z"); }
      50%  { d: path("M0,112 C172,155 325,52  485,105 C635,148 762,62  860,102 L860,0 L0,0 Z"); }
      100% { d: path("M0,82  C162,125 305,42  465,94  C625,138 762,52  860,88  L860,0 L0,0 Z"); }
    }
    @keyframes w1 {
      0%   { d: path("M0,68  C132,32  282,115 445,62  C595,16  732,94  860,52  L860,0 L0,0 Z"); }
      50%  { d: path("M0,85  C152,124 305,32  465,82  C615,128 762,46  860,82  L860,0 L0,0 Z"); }
      100% { d: path("M0,58  C172,94  314,22  474,72  C626,118 757,42  860,68  L860,0 L0,0 Z"); }
    }

    .name { animation: fadeUp 1.2s cubic-bezier(.22,1,.36,1) 0.2s both; }
    .role { animation: fadeUp 1.2s cubic-bezier(.22,1,.36,1) 0.5s both; }
    .tag  { animation: fadeUp 1.2s cubic-bezier(.22,1,.36,1) 0.8s both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .dot1 { animation: pulse1 2.2s ease-in-out infinite; }
    .dot2 { animation: pulse1 2.2s ease-in-out 1.1s infinite; }
    .scanline { animation: scan 3s linear infinite; }

    @keyframes pulse1 {
      0%, 100% { opacity: 0.9; r: 4; }
      50%       { opacity: 0.2; r: 7; }
    }
    @keyframes scan {
      0%   { transform: translateX(-860px); }
      100% { transform: translateX(860px); }
    }
  </style>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="860" height="210" fill="#050e1f"/>

    <!-- Subtle star-field dots -->
    <circle cx="80"  cy="170" r="1" fill="#00e5ff" opacity="0.25"/>
    <circle cx="200" cy="185" r="1" fill="#00e5ff" opacity="0.15"/>
    <circle cx="420" cy="178" r="1" fill="#ffffff" opacity="0.2"/>
    <circle cx="640" cy="190" r="1" fill="#00b4d8" opacity="0.2"/>
    <circle cx="780" cy="175" r="1" fill="#00e5ff" opacity="0.25"/>
    <circle cx="340" cy="195" r="1" fill="#ffffff" opacity="0.12"/>

    <!-- Scanline shimmer -->
    <rect class="scanline" x="0" y="0" width="120" height="210"
      fill="url(#scanGrad)" opacity="0.04"/>

    <!-- Wave layer 3 — deepest -->
    <path class="w3"
      d="M0,125 C130,85 270,155 440,110 C600,70 730,145 860,105 L860,0 L0,0 Z"
      fill="url(#waveGrad3)" opacity="0.95"/>

    <!-- Wave layer 2 -->
    <path class="w2"
      d="M0,95 C145,55 295,135 455,85 C615,35 745,115 860,75 L860,0 L0,0 Z"
      fill="url(#waveGrad2)" opacity="0.9"/>

    <!-- Wave layer 1 — top, brightest cyan edge -->
    <path class="w1"
      d="M0,68 C132,32 282,115 445,62 C595,16 732,94 860,52 L860,0 L0,0 Z"
      fill="url(#waveGrad1)"/>

    <!-- Neon edge highlight line on wave top -->
    <path class="w1"
      d="M0,68 C132,32 282,115 445,62 C595,16 732,94 860,52"
      fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>

    <!-- Pulsing accent dots -->
    <circle class="dot1" cx="55"  cy="166" r="4" fill="#00e5ff" filter="url(#dotGlow)" opacity="0.8"/>
    <circle class="dot2" cx="808" cy="170" r="4" fill="#3C8BD6" filter="url(#dotGlow)" opacity="0.8"/>

    <!-- Name text with cyan glow -->
    <text class="name"
      x="430" y="150"
      font-family="'JetBrains Mono', 'Courier New', monospace"
      font-size="46"
      font-weight="700"
      fill="#ffffff"
      text-anchor="middle"
      filter="url(#cyanGlow)"
      letter-spacing="2">Raaju Pahlowan</text>

    <!-- Role in electric cyan -->
    <text class="role"
      x="430" y="178"
      font-family="'JetBrains Mono', 'Courier New', monospace"
      font-size="13.5"
      font-weight="500"
      fill="#00e5ff"
      text-anchor="middle"
      letter-spacing="3.5">iOS Developer  ·  UX Obsessed  ·  Dhaka, Bangladesh</text>

    <!-- Tagline dimmed -->
    <text class="tag"
      x="430" y="199"
      font-family="'JetBrains Mono', 'Courier New', monospace"
      font-size="11"
      fill="rgba(0,229,255,0.28)"
      text-anchor="middle"
      letter-spacing="1">Building user-centric iOS experiences @ Bdjobs.com Ltd</text>
  </g>
</svg>
