<svg width="620" height="320" viewBox="0 0 620 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050e1f"/>
      <stop offset="100%" style="stop-color:#071a30"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#0a1f3d"/>
      <stop offset="100%" style="stop-color:#0d2a50"/>
    </linearGradient>
    <filter id="cyanGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="termClip"><rect width="620" height="320" rx="12"/></clipPath>
  </defs>

  <style>
    /* Typewriter lines — each line appears then types character by character */
    .ln1  { animation: appear  0.01s  0.5s   both; }
    .ln2  { animation: appear  0.01s  2.0s   both; }
    .ln3  { animation: appear  0.01s  3.8s   both; }
    .ln4  { animation: appear  0.01s  5.2s   both; }
    .ln5  { animation: appear  0.01s  6.4s   both; }
    .ln6  { animation: appear  0.01s  7.6s   both; }
    .ln7  { animation: appear  0.01s  8.8s   both; }
    .ln8  { animation: appear  0.01s 10.0s   both; }
    .ln9  { animation: appear  0.01s 11.2s   both; }

    /* Clip-rect typing mask per line */
    .t1   { animation: type1  1.2s  0.5s  steps(38,end) both; }
    .t2   { animation: type2  1.5s  2.0s  steps(42,end) both; }
    .t3   { animation: type3  1.0s  3.8s  steps(30,end) both; }
    .t4   { animation: type4  1.0s  5.2s  steps(28,end) both; }
    .t5   { animation: type5  1.0s  6.4s  steps(32,end) both; }
    .t6   { animation: type6  1.0s  7.6s  steps(30,end) both; }
    .t7   { animation: type7  1.0s  8.8s  steps(36,end) both; }
    .t8   { animation: type8  1.0s 10.0s  steps(28,end) both; }
    .t9   { animation: type9  1.5s 11.2s  steps(44,end) both; }

    @keyframes appear { from{opacity:0} to{opacity:1} }

    /* Each typeX grows clipPath width from 0 → full line width */
    @keyframes type1 { from{width:0} to{width:340px} }
    @keyframes type2 { from{width:0} to{width:390px} }
    @keyframes type3 { from{width:0} to{width:280px} }
    @keyframes type4 { from{width:0} to{width:260px} }
    @keyframes type5 { from{width:0} to{width:300px} }
    @keyframes type6 { from{width:0} to{width:280px} }
    @keyframes type7 { from{width:0} to{width:330px} }
    @keyframes type8 { from{width:0} to{width:260px} }
    @keyframes type9 { from{width:0} to{width:400px} }

    /* Blinking cursor */
    .cursor { animation: blink 0.9s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Scanline shimmer */
    .scanlines rect { animation: scanMove 8s linear infinite; }
    @keyframes scanMove {
      from { transform: translateY(-320px); }
      to   { transform: translateY(320px); }
    }
  </style>

  <g clip-path="url(#termClip)">
    <!-- Body -->
    <rect width="620" height="320" fill="url(#termBg)"/>

    <!-- Scanline overlay -->
    <g class="scanlines" opacity="0.03">
      <rect x="0" y="0" width="620" height="2" fill="#00e5ff"/>
      <rect x="0" y="6" width="620" height="1" fill="#00e5ff"/>
      <rect x="0" y="12" width="620" height="2" fill="#00e5ff"/>
    </g>

    <!-- Title bar -->
    <rect width="620" height="36" fill="url(#titleBar)"/>
    <rect width="620" height="1" y="36" fill="#00e5ff" opacity="0.3"/>

    <!-- Traffic lights -->
    <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
    <circle cx="40" cy="18" r="6" fill="#febc2e"/>
    <circle cx="60" cy="18" r="6" fill="#28c840"/>

    <!-- Terminal title -->
    <text x="310" y="23" font-family="'JetBrains Mono',monospace" font-size="12"
      fill="#3C8BD6" text-anchor="middle" letter-spacing="2">raaju@portfolio ~ zsh</text>

    <!-- Line 1: prompt + command -->
    <g class="ln1">
      <text x="22" y="70" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#00e5ff" filter="url(#cyanGlow)">➜</text>
      <text x="40" y="70" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#3C8BD6">~/portfolio</text>
      <text x="126" y="70" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#ffffff">
        <tspan>cat</tspan>
        <tspan fill="#00e5ff"> about.swift</tspan>
      </text>
    </g>

    <!-- Line 2 output -->
    <g class="ln2">
      <svg x="22" y="78" width="390" height="20" overflow="hidden">
        <animate attributeName="width" from="0" to="390" dur="1.5s" begin="2.0s" fill="freeze"/>
        <text x="0" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#febc2e">let</text>
        <text x="30" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#ffffff"> raaju </text>
        <text x="80" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#3C8BD6">=</text>
        <text x="92" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#28c840"> Developer()</text>
      </svg>
    </g>

    <!-- Line 3 -->
    <g class="ln3">
      <svg x="22" y="101" width="280" height="20" overflow="hidden">
        <animate attributeName="width" from="0" to="280" dur="1.0s" begin="3.8s" fill="freeze"/>
        <text x="0" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#3C8BD6">  role:</text>
        <text x="54" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#00e5ff">    "iOS Developer"</text>
      </svg>
    </g>

    <!-- Line 4 -->
    <g class="ln4">
      <svg x="22" y="124" width="260" height="20" overflow="hidden">
        <animate attributeName="width" from="0" to="260" dur="1.0s" begin="5.2s" fill="freeze"/>
        <text x="0" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#3C8BD6">  based:</text>
        <text x="60" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#00e5ff">   "Dhaka 🇧🇩"</text>
      </svg>
    </g>

    <!-- Line 5 -->
    <g class="ln5">
      <svg x="22" y="147" width="300" height="20" overflow="hidden">
        <animate attributeName="width" from="0" to="300" dur="1.0s" begin="6.4s" fill="freeze"/>
        <text x="0" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#3C8BD6">  company:</text>
        <text x="78" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#00e5ff"> "Bdjobs.com Ltd"</text>
      </svg>
    </g>

    <!-- Line 6 -->
    <g class="ln6">
      <svg x="22" y="170" width="360" height="20" overflow="hidden">
        <animate attributeName="width" from="0" to="360" dur="1.0s" begin="7.6s" fill="freeze"/>
        <text x="0" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#3C8BD6">  focus:</text>
        <text x="57" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#00e5ff">    </text>
        <text x="75" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#ff5f57">[</text>
        <text x="83" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#00e5ff">"Swift"</text>
        <text x="138" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#3C8BD6">, </text>
        <text x="152" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#00e5ff">"UIKit"</text>
        <text x="205" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#3C8BD6">, </text>
        <text x="219" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#00e5ff">"SwiftUI"</text>
        <text x="283" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#ff5f57">]</text>
      </svg>
    </g>

    <!-- Line 7 -->
    <g class="ln7">
      <svg x="22" y="193" width="380" height="20" overflow="hidden">
        <animate attributeName="width" from="0" to="380" dur="1.0s" begin="8.8s" fill="freeze"/>
        <text x="0" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#3C8BD6">  currently:</text>
        <text x="92" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#00e5ff"> "Building iOS experiences"</text>
      </svg>
    </g>

    <!-- closing brace -->
    <g class="ln8">
      <svg x="22" y="216" width="20" height="20" overflow="hidden">
        <animate attributeName="width" from="0" to="20" dur="0.3s" begin="10.0s" fill="freeze"/>
        <text x="0" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#febc2e">)</text>
      </svg>
    </g>

    <!-- Line 9: next prompt -->
    <g class="ln9">
      <svg x="22" y="246" width="420" height="20" overflow="hidden">
        <animate attributeName="width" from="0" to="420" dur="1.5s" begin="11.2s" fill="freeze"/>
        <text x="0" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#00e5ff" filter="url(#cyanGlow)">➜</text>
        <text x="18" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#3C8BD6"> ~/portfolio</text>
        <text x="104" y="16" font-family="'JetBrains Mono',monospace" font-size="12.5" fill="#28c840"> git push origin main --force 🚀</text>
      </svg>
    </g>

    <!-- Blinking cursor -->
    <rect class="cursor" x="22" y="270" width="8" height="15" rx="1" fill="#00e5ff" opacity="0.85"/>

    <!-- Bottom status bar -->
    <rect y="300" width="620" height="20" fill="#0a1f3d" opacity="0.8"/>
    <text x="18" y="314" font-family="'JetBrains Mono',monospace" font-size="10" fill="#3C8BD6" opacity="0.7">● main</text>
    <text x="310" y="314" font-family="'JetBrains Mono',monospace" font-size="10" fill="#00e5ff" opacity="0.5" text-anchor="middle">swift 6.0  ●  xcode 16</text>
    <text x="600" y="314" font-family="'JetBrains Mono',monospace" font-size="10" fill="#3C8BD6" opacity="0.7" text-anchor="end">Dhaka 🇧🇩</text>
  </g>
</svg>
